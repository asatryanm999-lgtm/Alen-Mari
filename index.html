        #scrollHeart { position: absolute; font-size: 2rem; color: var(--navy); z-index: 50; transform: translate(-50%, -50%); }

              <body>
    <audio id="bgm" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div class="intro-screen">
        <div class="rings-box">
            <svg id="ringL" class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"/></svg>
            <svg id="ringR" class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"/></svg>
        </div>
        <h1 id="names" class="main-title">Ալեն & Մարի</h1>
        <p id="date" style="opacity:0; letter-spacing: 5px; font-size: 1.1rem;">20 . 05 . 2026</p>
        <button onclick="start()" style="margin-top:30px; background:none; border:1px solid #ddd; padding:10px 25px; border-radius:25px; font-size:0.9rem;">
            <i id="pIcon" class="fas fa-play"></i> Միացնել երաժշտությունը
        </button>
    </div>

    <section class="hero" data-aos="fade-in">
        <h2>Սիրով հրավիրում ենք Ձեզ՝ կիսելու մեր կյանքի ամենակարևոր և հիշարժան օրը</h2>
    </section>

    <section class="timer-section" data-aos="fade-up">
        <p style="letter-spacing: 2px; color: #888; font-size: 0.8rem;">ՄԻՆՉ ՀԱՆԴԻՊՈՒՄԸ ՄՆԱՑ</p>
        <div class="timer-grid">
            <div class="t-card"><span id="d" class="t-val">00</span><span class="t-lbl">Օր</span></div>
            <div class="t-card"><span id="h" class="t-val">00</span><span class="t-lbl">Ժամ</span></div>
            <div class="t-card"><span id="m" class="t-val">00</span><span class="t-lbl">Րոպե</span></div>
            <div class="t-card"><span id="s" class="t-val">00</span><span class="t-lbl">Վրկ</span></div>
        </div>
    </section>

    <section class="roadmap-area">
        <h2 style="text-align: center; font-family: 'Dancing Script'; font-size: 3rem; color: var(--navy); margin-bottom: 40px;">Ծրագիրը</h2>
        <div id="roadWrapper">
            <i class="fas fa-heart" id="scrollHeart"></i>
            <svg viewBox="0 0 400 1000" width="100%" height="100%" preserveAspectRatio="none">
                <path id="roadPath" d="M200,0 L200,1000" fill="none" stroke="#f0f0f0" stroke-width="2" stroke-dasharray="10,10"/>
            </svg>
            <div class="road-text" style="top: 0; left: 55%;"><b>12:00</b><br>Փեսայի տուն</div>

            <div class="road-text" style="top: 650px; left: 55%;"><b>16:00</b><br>Սուրբ Գայանե</div>
            <div class="road-text" style="top: 950px; right: 55%; text-align: right;"><b>18:30</b><br>Prime Hall</div>
        </div>
    </section>

    <section class="section-padding" data-aos="fade-up">

        <a href="#" style="color:var(--navy); font-weight:700; text-decoration:none;">ՏԵՍՆԵԼ ՔԱՐՏԵԶՈՒՄ</a>
    </section>

    <section class="section-padding" style="background: #fafafa;">
        <h2 style="font-family: 'Dancing Script'; font-size: 2.8rem;">Dress Code</h2>
        <p style="margin-bottom: 30px; color: #999;">Մենք շատ շնորհակալ կլինենք տեսնել Ձեզ մեր գունային գամմայի մեջ</p>
        <div style="display: flex; justify-content: center; gap: 35px;">
            <div><div style="width:60px; height:60px; background:#0A192F; border-radius:50%; border:3px solid #fff; box-shadow:0 5px 15px rgba(0,0,0,0.1);"></div><small>Navy</small></div>
            <div><div style="width:60px; height:60px; background:#000; border-radius:50%; border:3px solid #fff; box-shadow:0 5px 15px rgba(0,0,0,0.1);"></div><small>Black</small></div>
        </div>
    </section>

    <section class="section-padding">
        <div class="frame" style="height:550px;"><img src="couple2.jpg"></div>
        <div class="rsvp-box" data-aos="fade-up">
            <h2 style="font-family: 'Dancing Script'; font-size: 3rem; color: var(--navy);">RSVP</h2>
            <p style="color: #999; font-size: 0.9rem; margin-bottom: 30px;">Խնդրում ենք հաստատել Ձեր ներկայությունը մինչև 10.05.2026</p>
            <form>
                <input type="text" class="inp" placeholder="Անուն Ազգանուն" required>
                <select class="inp" required>
                    <option value="" disabled selected>Ում կողմից եք</option>
                    <option>Հարսի</option>
                    <option>Փեսայի</option>
                </select>
                <input type="number" class="inp" placeholder="Հյուրերի քանակը" required>
                <button type="submit" class="btn-submit">ՀԱՍՏԱՏԵԼ</button>
            </form>
        </div>
    </section>
        <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        function start() {
            const a = document.getElementById('bgm');
            if(a.paused) { a.play(); document.getElementById('pIcon').className = 'fas fa-pause'; }
            else { a.pause(); document.getElementById('pIcon').className = 'fas fa-play'; }
        }
        window.onload = () => {
            const rl = document.getElementById('ringL'), rr = document.getElementById('ringR');
            setTimeout(() => {
                rl.style.opacity = '1'; rl.style.transform = 'translateX(40px)';
                rr.style.opacity = '1'; rr.style.transform = 'translateX(-40px)';
            }, 600);
            setTimeout(() => { 
                document.getElementById('names').style.opacity = '1'; 
                document.getElementById('date').style.opacity = '1';
            }, 2600);
        };
        window.addEventListener('scroll', () => {
            const road = document.getElementById('roadWrapper'), pin = document.getElementById('scrollHeart'), path = document.getElementById('roadPath');
            const rect = road.getBoundingClientRect();
            let p = (window.innerHeight / 2 - rect.top) / rect.height;
            p = Math.max(0, Math.min(1, p));
            const pt = path.getPointAtLength(p * path.getTotalLength());
            pin.style.left = (pt.x / 400) * road.offsetWidth + 'px';
            pin.style.top = (pt.y / 1000) * road.offsetHeight + 'px';
        });
        const target = new Date("May 20, 2026 18:00:00").getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            }
        }, 1000);
    </script>
