<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ալեն & Մարի | 20.05.2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Sans+Armenian:wght@300;400;700&display=swap');
        :root { --navy: #0A192F; --gold: #D4AF37; --white: #FFFFFF; }
        body, html { margin: 0; padding: 0; font-family: 'Noto Sans Armenian', sans-serif; background: var(--white); color: #333; overflow-x: hidden; scroll-behavior: smooth; }
        
        .intro-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .rings-box { position: relative; width: 160px; height: 80px; margin-bottom: 20px; }
        .ring { position: absolute; width: 65px; height: 65px; fill: none; stroke: var(--gold); stroke-width: 1.5; opacity: 0; transition: 2s ease; }
        #ringL { left: 0; transform: translateX(-50px); }
        #ringR { right: 0; transform: translateX(50px); }
        .main-title { font-family: 'Dancing Script', cursive; font-size: 2.8rem; color: var(--navy); opacity: 0; margin: 10px 0; transition: 1.5s ease; }

        .hero { height: 75vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('couple1.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; text-align: center; padding: 0 30px; }
        .hero h2 { font-size: 1.3rem; font-weight: 400; line-height: 1.5; }

        .timer-grid { display: flex; justify-content: center; gap: 8px; padding: 40px 10px; background: #fcfcfc; }
        .t-card { background: white; padding: 12px 5px; border-radius: 12px; min-width: 65px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .t-val { font-size: 1.4rem; font-weight: 700; color: var(--navy); display: block; }
        .t-lbl { font-size: 0.6rem; color: #999; text-transform: uppercase; }

        .roadmap-area { padding: 60px 0; position: relative; }
        #roadWrapper { position: relative; width: 100%; max-width: 300px; height: 1000px; margin: 0 auto; }
        #scrollHeart { position: absolute; font-size: 1.8rem; color: var(--navy); z-index: 50; transform: translate(-50%, -50%); }
        .road-text { position: absolute; font-size: 0.85rem; width: 120px; line-height: 1.3; }

        .frame { width: 90%; max-width: 320px; height: 420px; margin: 0 auto 20px; border-radius: 20px; overflow: hidden; border: 5px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .frame img { width: 100%; height: 100%; object-fit: cover; }

        .rsvp-box { margin: 20px; padding: 40px 20px; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .inp { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; border-radius: 10px; font-size: 0.9rem; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: var(--navy); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; }
    </style>
</head>
<div style="text-align:center; padding:40px 0;" data-aos="fade-up">
        <div class="frame"><img src="church.jpg"></div>
        <h3 style="font-size:1.1rem;">Սուրբ Գայանե Եկեղեցի</h3>
        <a href="#" style="color:var(--navy); font-weight:700; text-decoration:none;">ՔԱՐՏԵԶ</a>
    </div>

    <div style="text-align:center; padding:40px 0;" data-aos="fade-up">
        <div class="frame"><img src="restaurant.jpg"></div>
        <h3 style="font-size:1.1rem;">Prime Hall Ռեստորան</h3>
        <a href="#" style="color:var(--navy); font-weight:700; text-decoration:none;">ՔԱՐՏԵԶ</a>
    </div>

    <div class="rsvp-box" data-aos="fade-up">
        <h2 style="text-align:center; font-family:'Dancing Script'; font-size:2.5rem; color:var(--navy);">RSVP</h2>
        <p style="text-align:center; font-size:0.8rem; color:#999; margin-bottom:20px;">Խնդրում ենք հաստատել մինչև 10.05.2026</p>
        <form>
            <input type="text" class="inp" placeholder="Անուն Ազգանուն" required>
            <select class="inp" required>
                <option value="" disabled selected>Ում կողմից եք</option>
                <option>Հարսի</option>
                <option>Փեսայի</option>
            </select>
            <input type="number" class="inp" placeholder="Հյուրերի քանակը" required>
            <button type="submit" class="btn-submit">ՀԱՍՏԱՏԵԼ</button>
        </form>
    </div>
    <div style="text-align:center; padding:40px 0;" data-aos="fade-up">
        <div class="frame"><img src="church.jpg"></div>
        <h3 style="font-size:1.1rem;">Սուրբ Գայանե Եկեղեցի</h3>
        <a href="#" style="color:var(--navy); font-weight:700; text-decoration:none;">ՔԱՐՏԵԶ</a>
    </div>

    <div style="text-align:center; padding:40px 0;" data-aos="fade-up">
        <div class="frame"><img src="restaurant.jpg"></div>
        <h3 style="font-size:1.1rem;">Prime Hall Ռեստորան</h3>
        <a href="#" style="color:var(--navy); font-weight:700; text-decoration:none;">ՔԱՐՏԵԶ</a>
    </div>

    <div class="rsvp-box" data-aos="fade-up">
        <h2 style="text-align:center; font-family:'Dancing Script'; font-size:2.5rem; color:var(--navy);">RSVP</h2>
        <p style="text-align:center; font-size:0.8rem; color:#999; margin-bottom:20px;">Խնդրում ենք հաստատել մինչև 10.05.2026</p>
        <form>
            <input type="text" class="inp" placeholder="Անուն Ազգանուն" required>
            <select class="inp" required>
                <option value="" disabled selected>Ում կողմից եք</option>
                <option>Հարսի</option>
                <option>Փեսայի</option>
            </select>
            <input type="number" class="inp" placeholder="Հյուրերի քանակը" required>
            <button type="submit" class="btn-submit">ՀԱՍՏԱՏԵԼ</button>
        </form>
    </div>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        function start() {
            const a = document.getElementById('bgm');
            if(a.paused) { a.play(); document.getElementById('pIcon').className = 'fas fa-pause'; }
            else { a.pause(); document.getElementById('pIcon').className = 'fas fa-play'; }
        }
        window.onload = () => {
            const rl = document.getElementById('ringL'), rr = document.getElementById('ringR');
            setTimeout(() => {
                rl.style.opacity = '1'; rl.style.transform = 'translateX(35px)';
                rr.style.opacity = '1'; rr.style.transform = 'translateX(-35px)';
            }, 600);
            setTimeout(() => { 
                document.getElementById('names').style.opacity = '1'; 
                document.getElementById('date').style.opacity = '1'; 
            }, 2000);
        };
        window.addEventListener('scroll', () => {
            const road = document.getElementById('roadWrapper'), pin = document.getElementById('scrollHeart'), path = document.getElementById('roadPath');
            const rect = road.getBoundingClientRect();
            let p = (window.innerHeight / 2 - rect.top) / rect.height;
            p = Math.max(0, Math.min(1, p));
            const pt = path.getPointAtLength(p * path.getTotalLength());
            pin.style.left = (pt.x / 400) * road.offsetWidth + 'px';
            pin.style.top = (pt.y / 1000) * road.offsetHeight + 'px';
        });
        const target = new Date("May 20, 2026 18:00:00").getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            }
        }, 1000);
    </script>
</body>
</html>
